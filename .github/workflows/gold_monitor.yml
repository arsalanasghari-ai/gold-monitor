name: Gold Price Monitor

on:
  schedule:
    - cron: '0 * * * *'       # هر ساعت یکبار (بررسی قیمت + اخبار)
    - cron: '30 16 * * *'     # ساعت ۲۰:۰۰ به وقت تهران (16:30 UTC) -> گزارش روزانه
  workflow_dispatch:

jobs:
  check-gold:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "16" ] && [ "$MIN" = "30" ]; then
            echo "mode=daily_report" >> $GITHUB_OUTPUT
          else
            echo "mode=hourly" >> $GITHUB_OUTPUT
          fi

      - name: Run gold monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}
        run: python gold_monitor.py
